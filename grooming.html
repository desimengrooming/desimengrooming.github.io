<!DOCTYPE html>
<html lang="en">
<head>
<title>GROOMING</title>

<style>

body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 30px;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
}

/* NAV */
.nav-buttons {
  margin-bottom: 20px;
}

.home-btn {
  text-decoration: none;
  padding: 8px 18px;
  background: #111;
  border-radius: 20px;
  color: #fff;
  font-size: 14px;
}

/* TITLE */
.title {
  text-align: center;
  margin-bottom: 30px;
  font-size: 34px;
  color: #111;
}

/* SEARCH */
#searchInput {
  width: 60%;
  padding: 12px;
  border-radius: 25px;
  border: 1px solid #ddd;
  margin: 20px auto 40px;
  display: block;
  font-size: 16px;
  text-align: center;
}

/* GRID */
.articles {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
}

/* CARD */
.article {
  background: white;
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  transition: 0.3s;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

.article:hover {
  transform: translateY(-6px);
  box-shadow: 0 15px 30px rgba(0,0,0,0.12);
}

/* TITLE */
.article h3 {
  margin-bottom: 10px;
}

/* BUTTON */
.read-btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 18px;
  background: #111;
  color: white;
  border-radius: 20px;
  text-decoration: none;
  font-size: 14px;
}

.read-btn:hover {
  background: #333;
}

</style>
</head>

<body>

<div class="container">

<!-- NAV -->
<div class="nav-buttons">
  <a href="../index.html" class="home-btn">🏠 Home</a>
</div>

<h1 class="title">GROOMING</h1>

<input type="text" id="searchInput" placeholder="Search ..." onkeyup="searchArticles()">

<div class="articles">

<div class="article">
<h3>BEST TRIMMER </h3>
<a href="grooming/best-trimmer.html" class="read-btn">Explore</a>
</div>

<div class="article">
<h3>BEST PERFUMES </h3>
<a href="grooming/best-perfume.html" class="read-btn">Explore</a>
</div>

</div>

</div>

<script>
function searchArticles() {

let input = document.getElementById("searchInput").value.toLowerCase();
let articles = document.querySelectorAll(".article");

articles.forEach(function(article){

let text = article.innerText.toLowerCase();

if(text.includes(input)){
article.style.display="";
}else{
article.style.display="none";
}

});

}
</script>

</body>
</html>
