<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Desi Men Grooming</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', Arial, sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#141e30,#243b55);
}

.container{
width:90%;
max-width:650px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.25);
padding:50px 60px;
border-radius:20px;
text-align:center;
box-shadow:0 25px 60px rgba(0,0,0,0.4);
color:white;
}

h1{
font-size:34px;
margin-bottom:10px;
}

.subtitle{
color:#e2e8f0;
margin-bottom:35px;
}

.contact-card{
background:rgba(255,255,255,0.9);
padding:18px 20px;
border-radius:12px;
margin-bottom:18px;
color:#222;
font-size:16px;
transition:0.3s;
}

.contact-card:hover{
transform:translateY(-6px);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.contact-card a{
text-decoration:none;
color:#0f172a;
font-weight:600;
}

.home-btn{
display:inline-block;
margin-top:25px;
padding:12px 28px;
border-radius:30px;
background:linear-gradient(135deg,#3a5fd9,#6a82fb);
color:white;
text-decoration:none;
font-weight:600;
transition:0.3s;
}

.home-btn:hover{
transform:scale(1.06);
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<div class="container">

<h1>Contact</h1>
<p class="subtitle">Questions, collaborations or suggestions? Reach out to us.</p>

<div class="contact-card">
<p>📸 <strong>Instagram:</strong> 
<a href="https://instagram.com/primeon05" target="_blank">primeon05</a>
</p>
</div>

<div class="contact-card">
<p>📌 <strong>Pinterest:</strong> 
<a href="https://www.pinterest.com/desimen_grooming" target="_blank">DesiMen Grooming</a>
</p>
</div>

<a href="index.html" class="home-btn">← Back to Home</a>

</div>

</body>
</html>
